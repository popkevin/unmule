<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1a1a"/>
  <!-- Grid pattern suggesting a proprietary dashboard -->
  <rect x="40" y="40" width="180" height="100" rx="4" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="40" y="155" width="180" height="100" rx="4" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="40" y="270" width="180" height="90" rx="4" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="240" y="40" width="360" height="200" rx="4" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="240" y="255" width="170" height="105" rx="4" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="425" y="255" width="175" height="105" rx="4" fill="#252525" stroke="#333" stroke-width="1"/>
  <!-- Flow lines in main panel -->
  <circle cx="310" cy="120" r="16" fill="#333" stroke="#444" stroke-width="1"/>
  <circle cx="420" cy="120" r="16" fill="#333" stroke="#444" stroke-width="1"/>
  <circle cx="530" cy="120" r="16" fill="#333" stroke="#444" stroke-width="1"/>
  <line x1="326" y1="120" x2="404" y2="120" stroke="#444" stroke-width="1.5"/>
  <line x1="436" y1="120" x2="514" y2="120" stroke="#444" stroke-width="1.5"/>
  <!-- Sidebar lines -->
  <rect x="55" y="60" width="100" height="8" rx="2" fill="#333"/>
  <rect x="55" y="78" width="70" height="6" rx="2" fill="#2a2a2a"/>
  <rect x="55" y="92" width="85" height="6" rx="2" fill="#2a2a2a"/>
  <rect x="55" y="106" width="60" height="6" rx="2" fill="#2a2a2a"/>
  <!-- Lock icon -->
  <g transform="translate(290, 170)">
    <rect x="0" y="8" width="20" height="16" rx="2" fill="#c45a2d"/>
    <path d="M4 8V5a6 6 0 0 1 12 0v3" fill="none" stroke="#c45a2d" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="320" y="196" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#c45a2d" text-anchor="left">PROPRIETARY</text>
